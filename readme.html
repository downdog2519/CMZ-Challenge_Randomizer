<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMZ — README</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background-color: #1c1c1c;
            color: #e6e6e6;
            font-family: "Courier New", monospace;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a78bfa;
        }

        .badge {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #888;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 3px 9px;
            user-select: none;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: "Courier New", monospace;
            font-size: 0.88rem;
            line-height: 1.7;
            color: #d4d4d4;
            /* prevent any selection-based editing cues */
            cursor: default;
            user-select: text;
            /* no editable attribute — this is a <pre>, not an input */
        }
    </style>
</head>
<body>
    <header>
        <h1>CMZ Challenge Generator — README</h1>
        <span class="badge">Read Only</span>
    </header>
    <main>
        <pre id="content">Loading…</pre>
    </main>

    <script>
        window.electronAPI.onReadmeContent((text) => {
            document.getElementById('content').textContent = text;
        });
    </script>
</body>
</html>
